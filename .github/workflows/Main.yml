name: WebBrowser

on:
  workflow_dispatch:

jobs:
  WebBrowser:
    name: WebBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # IP CHECK: Prints the standard datacenter tracking parameters for your reference
      - name: Inspect Runner Public IP & ISP Info
        run: |
          echo "========================================================"
          echo "🔍 TRACKING OUTBOUND TRAFFIC ENVIRONMENT IP..."
          echo "========================================================"
          curl -s https://ipinfo.io/json
          echo -e "\n========================================================"

      # MICROSOFT EDGE CHROMEBOOK ENGINE CONFIGURATION:
      # Passes a specialized User-Agent forcing the engine to announce itself 
      # specifically as Microsoft Edge running on top of a ChromeOS desktop device.
      - name: Start Isolated Edge Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --shm-size="6gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -p 3000:3000 \
            lscr.io/linuxserver/msedge:latest \
            --user-agent="Mozilla/5.0 (X11; CrOS x86_64 14541.0.0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0"

      # EXPOSES TUNNEL & HOLDS RUNNER SECURELY FOR 6 HOURS USING PINGGY
      - name: Create Web Connection
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM VIA PINGGY..."
          echo "========================================================"
          
          touch stream_tunnel.log
          
          # Establish background tunnel connection parameters via Pinggy
          ssh -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3000 free@the.pinggy.io > stream_tunnel.log 2>&1 &
          
          # Exactly 10 seconds to handshake before pulling the url link
          echo "⏳ Waiting 10 seconds for streaming connection to secure..."
          sleep 10
          
          # Extracts the newly generated pinggy.link URL from the logs
          LIVE_URL=$(grep -o 'https://[^ ]*\.pinggy\.link' stream_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Link creation paused. Connection log output:"
            cat stream_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL EDGE BROWSER RUNNING SUCCESSFULLY!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "⏳ SYSTEM LOCK ACTIVE: Holding execution environment live..."
          echo "========================================================"
          
          # Forced 6-hour pause block so the runner stays completely alive without showing logs
          sleep 21600
          free@the.pinggy.io
