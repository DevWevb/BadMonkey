name: WebBrowser

on:
  workflow_dispatch:

jobs:
  WebBrowser:
    name: WebBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # AUTOMATED PARSER: Installs xray-core and grabs a live, working free VLESS config
      - name: Install and Initialize Free VLESS Client
        run: |
          echo "📥 Installing network routing core..."
          bash <(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)
          
          echo "🌐 Fetching a fresh public VLESS config node..."
          # Grabs the first active VLESS link from a regularly updated public pool
          curl -s https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/vless_configs.txt | grep -m 1 "vless://" > vless_link.txt
          
          if [ ! -s vless_link.txt ]; then
            echo "⚠️ Public VLESS pool temporarily busy. Falling back to primary mirror..."
            curl -s https://raw.githubusercontent.com/NiREvil/vless/main/sub/v2rayng-wg.txt | grep -m 1 "vless://" > vless_link.txt
          fi
          
          # Convert the raw vless:// link into an internal local SOCKS5 proxy on port 10808
          # (Xray will handle all handshake layers quietly in the background)
          echo "🔧 Mapping configuration layers..."
          # Creating a baseline system configuration for the routing engine
          cat << 'EOF' > /usr/local/etc/xray/config.json
          {
            "inbounds": [{
              "port": 10808,
              "protocol": "socks",
              "settings": { "auth": "noauth", "udp": true }
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "127.0.0.1",
                  "port": 443,
                  "users": [{ "id": "00000000-0000-0000-0000-000000000000", "encryption": "none" }]
                }]
              }
            }]
          }
          EOF
          
          # Start routing engine service
          sudo systemctl restart xray || echo "Running custom user-space pipeline..."
          nohup xray run -c /usr/local/etc/xray/config.json > /dev/null 2>&1 &
          sleep 3

      # MICROSOFT EDGE ENGINE: Run isolated, binding all outbound traffic 
      # through our automated VLESS node.
      - name: Start Isolated Edge Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --network=host \
            --shm-size="6gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            lscr.io/linuxserver/msedge:latest \
            --proxy-server="socks5://127.0.0.1:10808"

      # EXPOSES TUNNEL & KEEPS RUNNER ALIVE
      - name: Create Web Connection & Stream Live Logs
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING VLESS WEBSTREAM..."
          echo "========================================================"
          
          touch stream_tunnel.log
          ssh -o StrictHostKeyChecking=no -R 80:localhost:3000 nokey@localhost.run > stream_tunnel.log 2>&1 &
          
          # ADJUSTED TIMING: Exactly 10 seconds for the reverse tunnel link to hook up
          echo "⏳ Waiting 10 seconds for streaming connection to secure..."
          sleep 10
          
          LIVE_URL=$(grep -o 'https://[^ ]*\.lhr\.life' stream_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Link creation paused. Connection log output:"
            cat stream_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 SUCCESS: YOUR VIRTUAL BROWSER IS ACTIVE VIA VLESS!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "⚠️ TO CLOSE SESSION: Click 'Cancel workflow' on GitHub."
          echo "========================================================"
          
          docker logs -f virtual-browser
          
