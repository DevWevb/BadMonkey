name: WebBrowser

on:
  workflow_dispatch:

jobs:
  # JOB NAME RENAME: Changed the job ID and display name to WebBrowser
  WebBrowser:
    name: WebBrowser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # IP CHECK: Prints the exact public IP address your friend's website will see.
      - name: Inspect Runner Public IP & ISP Info
        run: |
          echo "========================================================"
          echo "🔍 TRACKING OUTBOUND TRAFFIC ENVIRONMENT IP..."
          echo "========================================================"
          curl -s https://ipinfo.io/json
          echo -e "\n========================================================"

      # MICROSOFT EDGE ENGINE: Runs Microsoft Edge with a 6GB shared memory buffer.
      - name: Start Isolated Edge Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --shm-size="6gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -p 3000:3000 \
            lscr.io/linuxserver/msedge:latest

      # EXPOSES TUNNEL: Routes port 3000 directly to a public address
      - name: Create Web Connection & Stream Live Logs
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM..."
          echo "========================================================"
          
          touch stream_tunnel.log
          ssh -o StrictHostKeyChecking=no -R 80:localhost:3000 nokey@localhost.run > stream_tunnel.log 2>&1 &
          
          # Gives the websocket handshake exactly 30 seconds to fully stabilize
          echo "⏳ Waiting 30 seconds for streaming connection to secure..."
          sleep 30
          
          LIVE_URL=$(grep -o 'https://[^ ]*\.lhr\.life' stream_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Link creation paused. Connection log output:"
            cat stream_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL EDGE BROWSER RUNNING SUCCESSFULLY!"
          echo "👉 LIVE BROWSER URL: $LIVE_URL"
          echo "========================================================"
          echo "👇 LOG STREAM STARTING BELOW (LIVE DOCKER INTERNAL OUTPUT) 👇"
          echo "========================================================"
          
          # This hooks directly into the running Edge engine output logs.
          # It prints traffic handshakes and rendering stats live.
          docker logs virtual-browser
          
